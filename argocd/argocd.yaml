apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 7.*
    helm:
      valueFiles: []
      values: |
        global:
          domain: ""
        server:
          service:
            type: NodePort
            nodePortHttp: 30080
            nodePortHttps: 30443
          extraArgs:
            - --insecure
        configs:
          params:
            server.insecure: true
        dex:
          enabled: false
        notifications:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
