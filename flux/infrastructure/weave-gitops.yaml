apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: weave-gitops
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/weaveworks/charts
  type: oci
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: weave-gitops
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: weave-gitops
      version: "4.*"
      sourceRef:
        kind: HelmRepository
        name: weave-gitops
  values:
    adminUser:
      create: true
      username: admin
      passwordHash: "$2b$12$gQu3V.5fi4XKegzBjQSnVO7FomCL0UR7YqELO6HMAzkjOSyDpKkn."
    service:
      type: NodePort
      port: 9001
      nodePort: 30090
