apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: workshop-k8s
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/gjed/workshop-2026-k8s.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 5m
  path: ./flux/infrastructure
  prune: true
  sourceRef:
    kind: GitRepository
    name: workshop-k8s
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./flux/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: workshop-k8s
  dependsOn:
    - name: infrastructure
